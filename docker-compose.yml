services:
  echolink_db:
    image: postgres:latest
    environment:
      POSTGRES_USER: echolink_user
      POSTGRES_PASSWORD: 14341225
      POSTGRES_DB: echolink_db
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - echo_net

  echolink:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - echolink_db
    networks:
      - echo_net

  echolink_client:
    stdin_open: true
    tty: true
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - echolink_db
      - echolink
    networks:
      - echo_net

networks:
  echo_net:
    driver: bridge